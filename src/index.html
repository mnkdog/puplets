<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puplets - Premium Dog Collars</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #F5F1ED;
            color: #101820;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Decorative circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.7;
        }

        .circle-red { background: #D6001C; width: 120px; height: 120px; top: 15%; left: 5%; }
        .circle-blue { background: #0076CF; width: 150px; height: 150px; top: 10%; right: 10%; }
        .circle-green { background: #00AD50; width: 100px; height: 100px; bottom: 20%; left: 8%; }
        .circle-red-small { background: #D6001C; width: 80px; height: 80px; top: 60%; right: 15%; }
        .circle-blue-small { background: #0076CF; width: 110px; height: 110px; bottom: 15%; right: 5%; }
        .circle-green-small { background: #00AD50; width: 90px; height: 90px; top: 45%; left: 12%; }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            position: relative;
            z-index: 10;
        }

        .logo-nav {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 600;
            color: #101820;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .cart-button {
            background: #101820;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.2s;
            position: relative;
        }

        .cart-button:hover {
            transform: translateY(-2px);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #D6001C;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: #5A4A42;
            text-decoration: none;
            font-weight: 500;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: #101820;
            border-radius: 2px;
            transition: 0.3s;
        }

        .mobile-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .mobile-menu.active {
            display: block;
        }

        .mobile-menu-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 80%;
            max-width: 300px;
            height: 100%;
            background: white;
            padding: 2rem;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        .mobile-menu-close {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            margin-bottom: 2rem;
        }

        .mobile-menu-links {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .mobile-menu-links a {
            color: #101820;
            text-decoration: none;
            font-size: 1.25rem;
            font-weight: 500;
        }

        /* Main content */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: calc(100vh - 100px);
            padding: 2rem;
            position: relative;
            z-index: 5;
        }

        .dog-illustration {
            width: 200px;
            height: auto;
            margin-bottom: 2rem;
            stroke: #101820;
            stroke-width: 2;
            fill: none;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            color: #101820;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        .tagline {
            font-size: 1.5rem;
            color: #5A4A42;
            margin-bottom: 3rem;
            max-width: 600px;
        }

        .shop-button {
            background: #101820;
            color: white;
            padding: 1.25rem 3rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(16, 24, 32, 0.2);
        }

        .shop-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 24, 32, 0.3);
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .tagline { font-size: 1.2rem; }
            nav {
                padding: 1rem 1.5rem;
            }

            .hamburger {
                display: flex;
            }

            .nav-links a:not(.cart-button) {
                display: none;
            }

            .nav-links {
                gap: 1rem;
            }

            /* Adjust circles for mobile */
            .circle-red { width: 80px; height: 80px; top: 10%; left: -20px; }
            .circle-blue { width: 100px; height: 100px; top: 5%; right: -30px; }
            .circle-green { width: 70px; height: 70px; bottom: 25%; left: -15px; }
            .circle-red-small { width: 60px; height: 60px; top: 55%; right: -10px; }
            .circle-blue-small { width: 80px; height: 80px; bottom: 10%; right: -20px; }
            .circle-green-small { width: 65px; height: 65px; top: 40%; left: -10px; }
        }
    </style>
</head>
<body>
    <!-- Decorative circles -->
    <div class="circle circle-red"></div>
    <div class="circle circle-blue"></div>
    <div class="circle circle-green"></div>
    <div class="circle circle-red-small"></div>
    <div class="circle circle-blue-small"></div>
    <div class="circle circle-green-small"></div>

    <!-- Navigation -->
    <nav>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <button class="hamburger" onclick="toggleMobileMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <a href="/" class="logo-nav">
                <img src="logo.png" alt="Puplets" class="logo-icon">
                Puplets
            </a>
        </div>
        <div class="nav-links">
            <a href="products.html">Products</a>
            <a href="blog.html">Blog</a>
            <a href="about.html">About</a>
            <a href="cart.html" class="cart-button">
                <span>🛒</span>
                Cart
                <span class="cart-count" id="cartCount" style="display: none;">0</span>
            </a>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobileMenu" onclick="closeMobileMenu(event)">
        <div class="mobile-menu-content" onclick="event.stopPropagation()">
            <button class="mobile-menu-close" onclick="closeMobileMenu()">&times;</button>
            <div class="mobile-menu-links">
                <a href="/">Home</a>
                <a href="products.html">Products</a>
                <a href="blog.html">Blog</a>
                <a href="about.html">About</a>
            </div>
        </div>
    </div>

    <!-- Hero section -->
    <div class="hero">
        <img src="logo.png" alt="Puplets Logo" class="dog-illustration" style="width: 250px; height: auto;">

        <h1>Puplets</h1>
        <p class="tagline">Premium dog collars for your beloved companion</p>
        <a href="products.html" class="shop-button">Shop Now</a>
    </div>

    <script>
        // Update cart count on page load
        document.addEventListener('DOMContentLoaded', () => {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const countElement = document.getElementById('cartCount');
            if (cart.length > 0) {
                countElement.textContent = cart.length;
                countElement.style.display = 'flex';
            }
        });

        // Mobile menu toggle
        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('active');
        }

        function closeMobileMenu(event) {
            if (!event || event.target === event.currentTarget) {
                const menu = document.getElementById('mobileMenu');
                menu.classList.remove('active');
            }
        }
    </script>
</body>
</html>
